<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media List Planner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="shared-data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-size:28px;font-weight:800;letter-spacing:-1px}
.logo span{color:#aa0000}
.header-subtitle{font-size:13px;color:#8892b0;margin-top:2px}
.btn{padding:10px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#aa0000;color:#fff}
.btn-primary:hover{background:#cc1133}
.btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-outline:hover{border-color:#aa0000;color:#aa0000}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-green{background:#2ec4b6;color:#fff}
.btn-green:hover{background:#25a89c}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-dark{background:#0f3460;color:#fff}
.btn-dark:hover{background:#1a4a7a}
.container{max-width:1400px;margin:0 auto;padding:20px}
.input-section{background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:24px}
.input-section h2{font-size:20px;color:#1a1a2e;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:280px 1fr;gap:20px;margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .2s}
.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#0f3460}
.form-group textarea{min-height:100px;resize:vertical}
.form-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.detected-categories{margin-top:16px;font-size:13px;color:#666}
.detected-categories .cat-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#e8eaf6;color:#3f51b5;margin:2px 4px}
.detected-categories .cat-tag.high{background:#c8e6c9;color:#2e7d32}
.results{display:none}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .3s}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:6px}
.card-value{font-size:22px;font-weight:700;color:#1a1a2e}
.card-value.small{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:#999;margin-top:4px}
.card.highlight{border:2px solid #2ec4b6;background:#f0fffe}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.chart-card h3{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:16px}
.chart-card.full-width{grid-column:1/-1}
.chart-container{position:relative;width:100%;max-height:350px}
.chart-container canvas{max-height:350px}
.table-section{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:24px;overflow-x:auto}
.table-section h3{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.table-subtitle{font-size:12px;color:#888;margin-bottom:16px}
.table-actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f9fa;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e9ecef;white-space:nowrap;user-select:none;position:sticky;top:0;z-index:1;cursor:pointer}
th:hover{background:#e9ecef}
th .sa{margin-left:3px;font-size:9px;color:#aaa}
th.age-col{font-size:10px;padding:8px 6px;min-width:50px}
td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#f0f7ff}
tr.unchecked td{opacity:.45}
.text-right{text-align:right}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:#e8eaf6;color:#3f51b5}
.platform-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;background:#f0f0f0;color:#666}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.85);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#aa0000;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px}
.filter-bar input{width:200px}
.count-badge{background:#aa0000;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.count-badge.green{background:#2ec4b6}
.selection-bar{background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:8px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.selection-bar .sel-info{font-size:13px}
.selection-bar .sel-info strong{color:#2ec4b6;font-size:16px}
.table-scroll{max-height:600px;overflow-y:auto;border:1px solid #e9ecef;border-radius:8px}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#aa0000}
@media(max-width:768px){
  .charts-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .header{padding:16px 20px;flex-direction:column;gap:12px}
}
</style>
</head>
<body>
<div class="header">

      <div class="logo">Freak<span>Out</span> Media Planner</div>
      <div class="header-subtitle">Campaign Media List & Audience Insight Generator</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-outline" onclick="resetApp()">New Plan</button>
  </div>
</div>
<div class="container">
  <div class="input-section" id="inputSection">
    <h2>Campaign Setup</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="countrySelect">Target Country</label>
        <select id="countrySelect">
          <option value="Indonesia">Indonesia (1,345 media)</option>
          <option value="Taiwan">Taiwan (768 media)</option>
          <option value="Malaysia">Malaysia (542 media)</option>
          <option value="Thailand">Thailand (348 media)</option>
          <option value="Vietnam">Vietnam (324 media)</option>
          <option value="Philippines">Philippines (139 media)</option>
          <option value="Singapore">Singapore (23 media)</option>
        </select>
        <div style="margin-top:12px">
          <label>Platforms</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
            <label style="font-size:12px;font-weight:400"><input type="checkbox" class="plat-check" value="mobile web" checked> Mobile Web</label>
            <label style="font-size:12px;font-weight:400"><input type="checkbox" class="plat-check" value="pc web" checked> PC Web</label>
            <label style="font-size:12px;font-weight:400"><input type="checkbox" class="plat-check" value="android app" checked> Android</label>
            <label style="font-size:12px;font-weight:400"><input type="checkbox" class="plat-check" value="iOs app" checked> iOS</label>
            <label style="font-size:12px;font-weight:400"><input type="checkbox" class="plat-check" value="web view app" checked> WebView</label>
            <label style="font-size:12px;font-weight:400"><input type="checkbox" class="plat-check" value="Connected TV"> CTV</label>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label for="briefInput">Campaign Brief (any language)</label>
        <textarea id="briefInput" placeholder="Describe your campaign target audience and objectives...&#10;&#10;Examples:&#10;- Promote a luxury SUV targeting affluent males 25-44 interested in tech&#10;- 20代〜30代の女性向けスキンケア商品のプロモーション&#10;- Promosi produk makanan halal untuk keluarga muda&#10;- แคมเปญเกมมือถือใหม่สำหรับวัยรุ่น&#10;- 推廣高端房地產給科技業高薪族群"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="generatePlan()">Generate Media List</button>
    </div>
    <div class="detected-categories" id="detectedCategories"></div>
  </div>
  <div class="results" id="results">
    <div class="selection-bar" id="selectionBar">
      <div class="sel-info">Selected: <strong id="selCount">0</strong> / <span id="selTotal">0</span> media</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:12px;opacity:.7">Est. Reachable Audience:</span>
        <strong id="selReach" style="color:#2ec4b6;font-size:18px">0</strong>
        <span style="font-size:12px;opacity:.7">(<span id="selReachPct">0</span>% of population)</span>
      </div>
    </div>
    <div class="summary-cards" id="summaryCards"></div>
    <div class="table-section">
      <h3>Recommended Media List</h3>
      <div class="table-subtitle" id="tableSubtitle"></div>
      <div class="table-actions">
        <button class="btn btn-green btn-sm" onclick="downloadCSV()">Download CSV (EN)</button>
        <button class="btn btn-dark btn-sm" onclick="downloadCSVJP()">Download CSV (JP)</button>
        <span style="flex:1"></span>
        <button class="btn btn-sm" style="background:#e8eaf6;color:#3f51b5" onclick="selectAll()">Select All</button>
        <button class="btn btn-sm" style="background:#e8eaf6;color:#3f51b5" onclick="selectNone()">Deselect All</button>
        <button class="btn btn-sm" style="background:#c8e6c9;color:#2e7d32" onclick="selectPrimary()">Select Primary Only</button>
      </div>
      <div class="filter-bar">
        <input type="text" id="searchMedia" placeholder="Search media name..." oninput="filterTable()">
        <select id="filterCat" onchange="filterTable()"><option value="">All Categories</option></select>
        <select id="filterPlatform" onchange="filterTable()"><option value="">All Platforms</option></select>
      </div>
      <div class="table-scroll">
        <table>
          <thead><tr id="tableHead"></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="charts-grid" id="chartsGrid"></div>
  </div>
</div>
<div class="loading-overlay" id="loading"><div class="spinner"></div><div style="font-size:13px;color:#666">Generating media plan...</div></div>

const AVAILABLE_CATEGORIES=Object.keys(CKW);

async function analyzeBriefAI(brief,country){
  const prompt=`You are an ad network media planning expert. Analyze this campaign brief and return a JSON object.

Campaign brief: "${brief}"
Target country: ${country}

Available media categories: ${AVAILABLE_CATEGORIES.join(', ')}

Return ONLY valid JSON (no markdown, no code blocks) with this exact structure:
{
  "categories": {"CategoryName": relevance_score, ...},
  "targetGender": {"male": weight} or {"female": weight} or {} if not specified,
  "targetAge": {"18-24": weight, ...} or {} if not specified,
  "reasoning": "brief explanation in English"
}

Rules:
- categories: pick 1-5 most relevant categories from the available list. Score 1-3 (3=perfect match).
- targetGender: only include if the brief implies a gender target. weight 1-3.
- targetAge: use groups 13-17, 18-24, 25-34, 35-44, 45-54, 55+. weight 1-3. Infer from context (e.g. "university students"→18-24, "mothers"→25-34).
- Think about WHO would be interested in this product/service, not just literal keywords.
- The brief can be in ANY language. Understand the intent regardless of language.`;

  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiApiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.1,maxOutputTokens:500}
    })
  });
  if(!res.ok) throw new Error('Gemini API error: '+res.status);
  const data=await res.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  // Parse JSON from response (strip markdown code blocks if any)
  const cleaned=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  return JSON.parse(cleaned);
}

  maleKW.forEach(k=>{if(wordMatch(l,k))tg.male=(tg.male||0)+1;});
  const ta={};
  // Numeric age parsing
  const agePatterns=[[/(\d{1,2})\s*(?:years?\s*old|yo\b)/gi],[/age[ds]?\s*(\d{1,2})/gi],[/(\d{1,2})\s*(?:歳|才|살|tuoi|ปี|tahun)/gi]];
  const ages=new Set();
  agePatterns.flat().forEach(p=>{let m;while((m=p.exec(l))!==null)ages.add(parseInt(m[1]));});
  let m;const dJP=/(\d{1,2})代/g;while((m=dJP.exec(l))!==null){const d=parseInt(m[1]);for(let i=d;i<d+10;i++)ages.add(i);}
  const rp=[/(\d{1,2})\s*[-~–—]\s*(\d{1,2})/gi,/(\d{1,2})\s*(?:to|から|sampai|ถึง|至)\s*(\d{1,2})/gi];
  rp.forEach(p=>{let m;while((m=p.exec(l))!==null){for(let i=parseInt(m[1]);i<=parseInt(m[2]);i++)ages.add(i);}});
  ages.forEach(a=>{let g;if(a>=13&&a<=17)g='13-17';else if(a>=18&&a<=24)g='18-24';else if(a>=25&&a<=34)g='25-34';else if(a>=35&&a<=44)g='35-44';else if(a>=45&&a<=54)g='45-54';else if(a>=55)g='55+';if(g)ta[g]=(ta[g]||0)+1;});
  return {categories:s,targetGender:tg,targetAge:ta};
}

async function generatePlan(){
  const country=document.getElementById('countrySelect').value;
  const brief=document.getElementById('briefInput').value.trim();
  if(!brief){alert('Please enter a campaign brief.');return;}
  document.getElementById('loading').style.display='flex';
  try{
    const meta=COUNTRY_META[country];
    const cfg=COUNTRY_CONFIG[country]||{};
    meta.baseline=cfg.baseline;
    P=COUNTRY_CATEGORIES[country]||{};
    const catOverrides=COUNTRY_MEDIA_DB[country]||{};
    const raw=(MEDIA_DB[country]||[]).map(m=>{
      const override=catOverrides[m.i];
      return override?{...m,c:override}:m;
    });
    // Analyze brief: AI (Gemini) or local fallback
    let analysis,aiUsed=false;
    if(geminiApiKey){
      try{analysis=await analyzeBriefAI(brief,country);aiUsed=true;}
      catch(e){console.warn('Gemini API failed, using local:',e);analysis=analyzeBriefLocal(brief);}
    }else{analysis=analyzeBriefLocal(brief);}
    const scores=analysis.categories||{};
    const tGender=analysis.targetGender||{};
    const tAge=analysis.targetAge||{};
    const reasoning=analysis.reasoning||'';
    const platforms=[...document.querySelectorAll('.plat-check:checked')].map(c=>c.value);
    const catDiv=document.getElementById('detectedCategories');
    let detectedHtml='<strong>Detected categories:</strong> '+Object.entries(scores).sort((a,b)=>b[1]-a[1]).map(([c,s])=>`<span class="cat-tag${s>=2?' high':''}">${c} (${s})</span>`).join('');
    if(Object.keys(tGender).length) detectedHtml+='<br><strong>Target gender:</strong> '+Object.keys(tGender).map(g=>`<span class="cat-tag">${g}</span>`).join('');
    if(Object.keys(tAge).length) detectedHtml+='<br><strong>Target age:</strong> '+Object.keys(tAge).map(a=>`<span class="cat-tag">${a}</span>`).join('');
    if(reasoning) detectedHtml+='<br><span style="font-size:11px;color:#999"><strong>AI reasoning:</strong> '+reasoning+'</span>';
    if(aiUsed) detectedHtml+='<br><span style="font-size:10px;color:#2ec4b6">&#9679; Powered by Gemini AI</span>';
    catDiv.innerHTML=detectedHtml;
    let filtered=raw.filter(m=>platforms.includes(m.f));
    const matchedCats=Object.keys(scores);
    const defaultProfile={male:50,female:50,age:{'13-17':8,'18-24':22,'25-34':28,'35-44':20,'45-54':13,'55+':9},income:{'Lower 50%':25,'11-20%':16,'21-30%':16,'31-40%':16,'41-50%':15,'Top 10%':12},household:{'1-2':15,'3-4':35,'5-6':32,'7+':18},marital:{Single:38,Married:48,Separated:14},children:{Yes:50,No:50}};
    const hasGenderTarget=Object.keys(tGender).length>0;
    const hasAgeTarget=Object.keys(tAge).length>0;
    const hasDemoTarget=hasGenderTarget||hasAgeTarget;
    allMedia=filtered.map(m=>{
      const catScore=scores[m.c]||0;
      const profile=P[m.c]||P['General Lifestyle']||defaultProfile;
      let genderFit=50,ageFit=50;
      if(hasGenderTarget){
        const gKeys=Object.keys(tGender);
        if(gKeys.length===1&&gKeys[0]==='female') genderFit=profile.female;
        else if(gKeys.length===1&&gKeys[0]==='male') genderFit=profile.male;
        else genderFit=(profile.male+profile.female)/2;
      }
      if(hasAgeTarget){ageFit=Object.keys(tAge).reduce((s,a)=>s+(profile.age[a]||0),0);}
      const demoScore=hasDemoTarget?((hasGenderTarget?genderFit/50:1)+(hasAgeTarget?ageFit/25:1)):0;
      const relevance=catScore+demoScore;
      return {...m,relevance,genderFit,ageFit,profile};
    }).sort((a,b)=>b.relevance-a.relevance||a.n.localeCompare(b.n));
    checkedIds=new Set();
    allMedia.forEach(m=>{if(m.relevance>0)checkedIds.add(m.i);});
    currentResult={country,meta,brief,scores,matchedCats};
    renderAll();
  }catch(e){console.error('generatePlan error:',e);alert('Error: '+e.message);}
  finally{document.getElementById('loading').style.display='none';}
}

function renderAll(){
  renderTable(getFilteredMedia());
  updateInsights();
  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
}

function getFilteredMedia(){
  const search=document.getElementById('searchMedia')?.value?.toLowerCase()||'';
  const cat=document.getElementById('filterCat')?.value||'';
  const plat=document.getElementById('filterPlatform')?.value||'';
  let f=allMedia;
  if(search)f=f.filter(m=>m.n.toLowerCase().includes(search)||m.p.toLowerCase().includes(search));
  if(cat)f=f.filter(m=>m.c===cat);
  if(plat)f=f.filter(m=>m.f===plat);
  // Sort
  const sorted=[...f].sort((a,b)=>{
    let va,vb;
    const pa=a.profile,pb=b.profile;
    if(sortCol==='name'){va=a.n.toLowerCase();vb=b.n.toLowerCase();}
    else if(sortCol==='partner'){va=a.p.toLowerCase();vb=b.p.toLowerCase();}
    else if(sortCol==='category'){va=a.c;vb=b.c;}
    else if(sortCol==='platform'){va=a.f;vb=b.f;}
    else if(sortCol==='male'){va=pa.male;vb=pb.male;}
    else if(sortCol==='female'){va=pa.female;vb=pb.female;}
    else if(sortCol==='relevance'){va=a.relevance;vb=b.relevance;}
    else if(sortCol==='id'){va=a.i;vb=b.i;}
    else if(AG.includes(sortCol)){va=pa.age[sortCol];vb=pb.age[sortCol];}
    else{va=0;vb=0;}
    if(typeof va==='string') return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });
  return sorted;
}

function doSort(col){
  if(sortCol===col)sortAsc=!sortAsc;
  else{sortCol=col;sortAsc=(col==='name'||col==='partner'||col==='category'||col==='platform');}
  renderTable(getFilteredMedia());
}

function renderTable(media){
  // Populate filters
  const cats=[...new Set(allMedia.map(x=>x.c))].sort();
  const plats=[...new Set(allMedia.map(x=>x.f))].sort();
  const fCat=document.getElementById('filterCat');
  const curCat=fCat.value;
  fCat.innerHTML='<option value="">All Categories</option>'+cats.map(c=>'<option value="'+c+'"'+(c===curCat?' selected':'')+'>'+c+' ('+allMedia.filter(x=>x.c===c).length+')</option>').join('');
  const fPlat=document.getElementById('filterPlatform');
  const curPlat=fPlat.value;
  fPlat.innerHTML='<option value="">All Platforms</option>'+plats.map(p=>'<option value="'+p+'"'+(p===curPlat?' selected':'')+'>'+p+'</option>').join('');
  
  const sa=c=>sortCol===c?(sortAsc?' &#9650;':' &#9660;'):'';
  const sh=(label,col,cls)=>`<th class="${cls||''}" onclick="doSort('${col}')">${label}<span class="sa">${sa(col)}</span></th>`;
  document.getElementById('tableHead').innerHTML=
    '<th style="cursor:default"><input type="checkbox" id="checkAll" onchange="toggleAllVisible(this.checked)"></th>'+
    '<th style="cursor:default">#</th>'+
    sh('ID','id','text-right')+sh('Media Name','name','')+sh('Media Partner','partner','')+
    sh('Category','category','')+sh('Platform','platform','')+
    sh('Male%','male','text-right')+sh('Female%','female','text-right')+
    AG.map(g=>sh(g,g,'text-right age-col')).join('')+
    sh('Relevance','relevance','text-right');
  document.getElementById('tableBody').innerHTML=media.map((m,i)=>{
    const p=m.profile;
    const checked=checkedIds.has(m.i);
    const topAgeG=AG.reduce((a,b)=>p.age[a]>p.age[b]?a:b);
    return `<tr class="${checked?'':'unchecked'}" data-id="${m.i}">
      <td><input type="checkbox" ${checked?'checked':''} onchange="toggleMedia(${m.i},this.checked)"></td>
      <td class="text-right" style="color:#aaa;font-size:11px">${i+1}</td>
      <td class="text-right">${m.i}</td>
      <td><a href="${m.u||'#'}" target="_blank" style="color:#0f3460;text-decoration:none;font-weight:500">${m.n}</a></td>
      <td style="font-size:11px;color:#888;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.p}</td>
      <td><span class="cat-badge">${m.c}</span></td>
      <td><span class="platform-badge">${m.f}</span></td>
      <td class="text-right">${p.male}%</td>
      <td class="text-right">${p.female}%</td>
      ${AG.map(g=>`<td class="text-right" style="font-size:11px;${g===topAgeG?'font-weight:700;color:#aa0000':''}">${p.age[g]}%</td>`).join('')}
      <td class="text-right" style="font-weight:600;color:${m.relevance>0?'#2e7d32':'#ccc'}">${m.relevance>0?m.relevance.toFixed(1):'-'}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableSubtitle').textContent=`${media.length} media shown / ${allMedia.length} total for ${currentResult.country}`;
}

function toggleMedia(id,checked){
  if(checked)checkedIds.add(id); else checkedIds.delete(id);
  const row=document.querySelector(`tr[data-id="${id}"]`);
  if(row)row.className=checked?'':'unchecked';
  updateInsights();
}

function toggleAllVisible(checked){
  getFilteredMedia().forEach(m=>{
    if(checked)checkedIds.add(m.i); else checkedIds.delete(m.i);
  });
  renderTable(getFilteredMedia());
  updateInsights();
}

function selectAll(){checkedIds=new Set(allMedia.map(m=>m.i));renderTable(getFilteredMedia());updateInsights();}
function selectNone(){checkedIds.clear();renderTable(getFilteredMedia());updateInsights();}
function selectPrimary(){checkedIds=new Set(allMedia.filter(m=>m.relevance>0).map(m=>m.i));renderTable(getFilteredMedia());updateInsights();}

function filterTable(){renderTable(getFilteredMedia());}

function updateInsights(){
  const sel=allMedia.filter(m=>checkedIds.has(m.i));
  const r=currentResult; const meta=r.meta; const bl=meta.baseline;
  const n=sel.length||1;

  // Weighted averages
  const w={male:0,female:0};
  AG.forEach(g=>w['a_'+g]=0); IK.forEach(k=>w['i_'+k]=0); HK.forEach(k=>w['h_'+k]=0); MR.forEach(k=>w['m_'+k]=0); CH.forEach(k=>w['c_'+k]=0);
  const catCount={};
  sel.forEach(m=>{
    const p=m.profile;
    w.male+=p.male;w.female+=p.female;
    AG.forEach(g=>w['a_'+g]+=p.age[g]); IK.forEach(k=>w['i_'+k]+=p.income[k]); HK.forEach(k=>w['h_'+k]+=p.household[k]); MR.forEach(k=>w['m_'+k]+=p.marital[k]); CH.forEach(k=>w['c_'+k]+=p.children[k]);
    catCount[m.c]=(catCount[m.c]||0)+1;
  });
  Object.keys(w).forEach(k=>w[k]/=n);
  
  const uniqueReach=Math.min(Math.round(sel.length*meta.digitalPop*0.015),meta.digitalPop);
  const reachPct=(uniqueReach/meta.population*100);
  
  // Update selection bar
  document.getElementById('selCount').textContent=sel.length;
  document.getElementById('selTotal').textContent=allMedia.length;
  document.getElementById('selReach').textContent=fmt(uniqueReach);
  document.getElementById('selReachPct').textContent=reachPct.toFixed(1);
  
  // Summary cards
  document.getElementById('summaryCards').innerHTML=[
    {l:'Country',v:r.country,c:'small'},
    {l:'Population',v:fmt(meta.population)},
    {l:'Digital Population',v:fmt(meta.digitalPop)},
    {l:'Est. Reachable Audience',v:fmt(uniqueReach),hl:true},
    {l:'Reach % of Population',v:reachPct.toFixed(1)+'%',hl:true},
    {l:'Selected Media',v:sel.length+' / '+allMedia.length},
    {l:'Categories',v:Object.keys(catCount).length}
  ].map(x=>`<div class="card${x.hl?' highlight':''}"><div class="card-label">${x.l}</div><div class="card-value${x.c?' '+x.c:''}">${x.v}</div></div>`).join('');
  
  // Store for CSV
  currentResult.w=w; currentResult.catCount=catCount; currentResult.uniqueReach=uniqueReach; currentResult.reachPct=reachPct; currentResult.selMedia=sel;
  
  // Charts
  renderCharts(w,catCount,meta,bl);
}

function renderCharts(w,catCount,meta,bl){
  charts.forEach(c=>c.destroy());charts=[];
  const grid=document.getElementById('chartsGrid');grid.innerHTML='';
  
  addDonut(grid,'Gender Distribution',['Male','Female'],[w.male,w.female],['#0f3460','#aa0000']);
  addDonut(grid,'Age Group Distribution',AG,AG.map(g=>w['a_'+g]),CL.slice(0,6));
  addDonut(grid,'Income Distribution',IK,IK.map(k=>w['i_'+k]),['#ff6b6b','#ffa502','#2ec4b6','#0f3460','#533483','#16213e']);
  addDonut(grid,'Household Size',HK,HK.map(k=>w['h_'+k]),['#45b7d1','#0f3460','#aa0000','#533483']);
  addDonut(grid,'Marital Status',MR,MR.map(g=>w['m_'+g]),['#45b7d1','#aa0000','#ffa502']);
  addDonut(grid,'Parental Status',['With Children','Without Children'],CH.map(g=>w['c_'+g]),['#aa0000','#0f3460']);
  const ce=Object.entries(catCount).sort((a,b)=>b[1]-a[1]);
  addDonut(grid,'Media by Content Category',ce.map(e=>e[0]),ce.map(e=>e[1]),CL.slice(0,ce.length),true);
  
  // Affinity
  const ac=mkCard('Affinity Index (vs National Digital Baseline)');ac.classList.add('full-width');grid.appendChild(ac);
  const aL=['Male','Female',...AG,...IK,...HK,...MR,'W/ Kids','No Kids'];
  const aV=[w.male/bl.male*100,w.female/bl.female*100,...AG.map(g=>w['a_'+g]/bl.age[g]*100),...IK.map(k=>w['i_'+k]/bl.income[k]*100),...HK.map(k=>w['h_'+k]/bl.household[k]*100),...MR.map(g=>w['m_'+g]/bl.marital[g]*100),...CH.map(g=>w['c_'+g]/bl.children[g]*100)];
  charts.push(new Chart(ac.querySelector('canvas').getContext('2d'),{
    type:'bar',data:{labels:aL,datasets:[{label:'Affinity Index',data:aV,backgroundColor:aV.map(v=>v>=100?'#2ec4b6':'#ff6b6b'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'Index: '+ctx.parsed.y.toFixed(0)}}},scales:{y:{beginAtZero:true,title:{display:true,text:'Index (100 = Average)'}}}},
    plugins:[{id:'bl',afterDraw(ch){const y=ch.scales.y.getPixelForValue(100);const cx=ch.ctx;cx.save();cx.strokeStyle='#aa0000';cx.lineWidth=2;cx.setLineDash([6,4]);cx.beginPath();cx.moveTo(ch.chartArea.left,y);cx.lineTo(ch.chartArea.right,y);cx.stroke();cx.fillStyle='#aa0000';cx.font='11px sans-serif';cx.fillText('Baseline (100)',ch.chartArea.right-85,y-6);cx.restore();}}]
  }));
}

function addDonut(g,t,l,d,c,isC){const card=mkCard(t);g.appendChild(card);charts.push(new Chart(card.querySelector('canvas').getContext('2d'),{type:'doughnut',data:{labels:l,datasets:[{data:d,backgroundColor:c,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:10}}},tooltip:{callbacks:{label:ctx=>isC?`${ctx.label}: ${ctx.parsed} media`:`${ctx.label}: ${ctx.parsed.toFixed(1)}%`}}}}}));}
function mkCard(t){const d=document.createElement('div');d.className='chart-card';d.innerHTML=`<h3>${t}</h3><div class="chart-container"><canvas></canvas></div>`;return d;}

function dl(c,f){const b=new Blob([c],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click();URL.revokeObjectURL(a.href);}
function fmt(n){return Number(n).toLocaleString('en-US');}
function resetApp(){charts.forEach(c=>c.destroy());charts=[];currentResult=null;allMedia=[];checkedIds.clear();document.getElementById('results').style.display='none';document.getElementById('detectedCategories').innerHTML='';document.getElementById('briefInput').value='';document.getElementById('searchMedia')&&(document.getElementById('searchMedia').value='');}
